# This YAML file is a declarative manifest that describes the setup
# of an AutoKitteh sample project which demonstrates bidirectional
# integration with gRPC.

version: v1

project:
  name: grpc
  connections:
    - name: my_grpc
      integration: grpc
    - name: my_http
      integration: http
  triggers:
    - name: my_http_get
      connection: my_http
      event_type: get
      data:
        path: get
      # Triggered by GET request to http://localhost:9980/http/grpc/get
      call: program.star:on_http_get
