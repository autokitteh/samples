# This YAML file is a declarative manifest that describes the setup
# of an autokitteh sample project which demonstrates autokitteh's
# bidirectional integration with HTTP.

version: v1

project:
  name: http_sample
  vars:
    # Feel free to modify this when you run a local instance of httpbin.
    - name: HTTPBIN_BASE_URL
      value: https://httpbin.org
  connections:
    - name: http_no_auth
      integration: http
    - name: http_with_basic_auth
      integration: http
      token: TODO # Replace this with an autokitteh connection token
    - name: http_with_bearer_token
      integration: http
      token: TODO # Replace this with an autokitteh connection token
  triggers:
    # More HTTP methods are supported as event types:
    # head, put, delete, options, and patch.
    - connection: http_no_auth
      event_type: get
      data:
        path: get
      # triggered by a GET request to http://localhost:9980/http/http_sample/get
      call: no_auth.star:on_http_get
    - connection: http_no_auth
      event_type: post
      # triggered by a POST request to http://localhost:9980/http/http_sample/
      # since no additional path defined
      call: no_auth.star:on_http_post
    - connection: http_with_basic_auth
      event_type: get
      data:
        path: basic/{username}/{password}
      call: basic_auth.star:on_http_get_with_basic_auth
    - connection: http_with_bearer_token
      event_type: get
      data:
        path: /bearer/{token}
      call: bearer_token.star:on_http_get_with_bearer_token
