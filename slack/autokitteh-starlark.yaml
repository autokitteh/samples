# This YAML file is a declarative manifest that describes the setup
# of an AutoKitteh sample project that demonstrates 2-way integration
# with Slack (https://slack.com), using Starlark code, which is a
# dialect of Python (see https://bazel.build/rules/language).
#
# After applying this file, initialize the AutoKitteh connection to Slack.
#
# Compare this file with "autokitteh-python.yaml" that uses Python code.

version: v1

project:
  name: slack_sample
  connections:
    - name: my_slack
      integration: slack
  triggers:
    - name: slack_app_mention
      connection: my_slack
      event_type: app_mention
      call: program.star:on_slack_app_mention
    - name: slack_interaction
      connection: my_slack
      event_type: interaction
      call: program.star:on_slack_interaction
    - name: slack_message
      connection: my_slack
      event_type: message
      call: program.star:on_slack_message
    - name: slack_reaction_added
      connection: my_slack
      event_type: reaction_added
      call: program.star:on_slack_reaction_added
    - name: slack_slash_command
      connection: my_slack
      event_type: slash_command
      call: program.star:on_slack_slash_command
