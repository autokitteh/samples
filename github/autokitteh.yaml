# This YAML file is a declarative manifest that describes the setup of an
# AutoKitteh sample project that demonstrates bidirectional integration with
# GitHub (https://github.com).
#
# Before applying this file:
# - Create an autokitteh connection token for GitHub,
#   and replace the "TODO" line below

version: v1

project:
  name: github_sample
  connections:
    - name: my_github
      integration: github
      token: TODO # Replace this with an AutoKitteh connection token.
  triggers:
    - connection: my_github
      event_type: issue_comment
      # Handle only new issue comments in this sample code
      # (FYI, the other options are "edited" and "deleted").
      filter: "data.action == 'created'"
      call: program.star:on_github_issue_comment
