# This YAML file is a declarative manifest that describes
# the minimal setup of an autokitteh project.

version: v1

project:
  name: skeleton_project
  connections:
    - name: my_http
      integration: http
      token: trigger_path # http://<autokitteh address>/http/<project name>/<token>
  triggers:
    - name: get
      connection: my_http
      event_type: get
      call: program.star:on_http_get
