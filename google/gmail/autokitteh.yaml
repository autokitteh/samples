# This YAML file is a declarative manifest that describes the setup
# of an AutoKitteh sample project that demonstrates integration with
# Gmail (https://www.google.com/gmail/about/).
#
# Before applying this file:
# - Create AutoKitteh connection tokens for Gmail and Slack,
#   and replace the "TODO" lines below

version: v1

project:
  name: gmail_sample
  connections:
    - name: my_gmail
      integration: gmail
      token: TODO # Replace this with an AutoKitteh connection token.
    - name: my_slack
      integration: slack
      token: TODO # Replace this with an AutoKitteh connection token.
  triggers:
    - name: my_slack_slash_command
      connection: my_slack
      event_type: slash_command
      call: program.star:on_slack_slash_command
