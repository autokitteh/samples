# This YAML file is a declarative manifest that describes the setup of
# an AutoKitteh sample project that demonstrates integration with 
# Gmail, ChatGPT, and Slack.
#
# Before applying this file, set the "OPEN_API_KEY" value in the
# project's "vars" section.
#
# After applying this file, initialize this AutoKitteh project's
# ChatGPT, Gmail, and Slack connections.

version: v1

project:
  name: gmail_chat_gpt_slack
  vars:
    - name: OPENAI_API_KEY
      value: TODO # Replace this with your OpenAI API key ("sk-...").
      is_secret: true
  connections:
    - name: my_chatgpt
      integration: chatgpt
    - name: my_gmail
      integration: gmail
    - name: my_http
      integration: http
    - name: my_slack
      integration: slack
  triggers:
    - name: http_get
      connection: my_http
      event_type: get
      data:
        path: get
      # Triggered by GET request to http://localhost:9980/http/gmail_chatgpt_slack/get
      call: program.py:on_http_get
