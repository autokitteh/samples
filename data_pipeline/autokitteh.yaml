version: v1

project:
  name: pipeline
  connections:
    - name: aws  # Used for auth
      integration: aws
      token: bucket
    - name: trigger
      integration: http
  triggers:
    - name: new
      connection: trigger
      call: pipeline.py:on_new_s3_object
      event_type: post
      # Triggered by GET request to http://localhost:9980/http/pipeline/new
