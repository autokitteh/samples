# This YAML file is a declarative manifest that describes the setup
# of an AutoKitteh sample project which demonstrates bidirectional
# integration with HTTP and Slack.

version: v1

project:
  name: http2slack
  vars:
    - name: URL
      value: http://127.0.0.1:63365/api/v1/orchestrator/nodes
    - name: SLEEP_SECONDS
      value: 10
    - name: SLACK_CHANNEL
      value: "#your-slack-channel"
  connections:
    - name: my_http
      integration: http
    - name: my_slack
      integration: slack
  triggers:
    - name: my_http_get
      connection: my_http
      event_type: get
      data:
        path: get
      # Triggered by GET request to http://localhost:9980/http/http2slack/get
      call: program.star:on_http_get
