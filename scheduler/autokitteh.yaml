# This YAML file is a declarative manifest that describes the setup
# of an AutoKitteh sample project that demonstrates integration with
# a cron-like scheduler.
#
# Before applying this file:
# - Set the "SLACK_CHANNEL" value in the "vars" section
# - Create autokitteh connection tokens for Slack  and replace the
#   "TODO" lines below

# Schedule specification format is one from the follows:
# - standard 5 star cron spec
# - extended 7 star cron spec (seconds, minutes, etc..)
# - predefined, e.g. @yearly(@annually), @monthly, @weekly, @daily(@midnight), @hourly
# - intervals, e.g. @every 1h30m10s

version: v1

project:
  name: scheduler_sample
  vars:
    - name: SLACK_CHANNEL
      value: TODO # Replace this with a Slack channel name or ID.
  connections:
    - name: my_slack
      integration: slack
      token: TODO # Replace this with an autokitteh connection token.
triggers:
    - name: daily
      schedule: "@daily" # the same as `@midnight', or `0 0 * * *',  or `@every 1d'
      call: program.star:on_cron_trigger
