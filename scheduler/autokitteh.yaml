# This YAML file is a declarative manifest that describes the setup of an
# AutoKitteh sample project that demonstrates integration with a cron-like
# scheduler.

# This program scans a specific github repo on a daily basis for stalled PRs
# and, if found, sends a message to a specific Slack channel

# Before applying this file:
# - Set variables SLACK_CHANNEL, GITHUB_OWNER and GITHUB_REPO in the
#   manifest "vars" section
# - Create and initialize autokitteh connection for Slack and Github

# Schedule specification format is one from the following:
# - standard 5 star cron spec
# - extended 7 star cron spec (seconds, minutes, etc..)
# - predefined, e.g. @yearly(@annually), @monthly, @weekly, @daily(@midnight), @hourly
# - intervals, e.g. @every 1h30m10s

version: v1

project:
  name: scheduler_sample
  vars:
    - name: SLACK_CHANNEL
      value: TODO # replace this with a Slack channel name or ID.
    - name: GITHUB_OWNER
      value: TODO: # replace with actual repo owner
    - name: GITHUB_REPO
      value: TODO # replace with actual repo name
  connections:
    - name: my_github
      integration: github
    - name: my_slack
      integration: slack
  triggers:
    - name: daily
      schedule: "@daily" # the same as `@midnight', or `0 0 * * *',  or `@every 1d'
      call: program.star:on_cron_trigger
