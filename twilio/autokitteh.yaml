# This YAML file is a declarative manifest that describes the setup
# of an AutoKitteh sample project that demonstrates integration with
# Twilio (https://www.twilio.com).
#
# Before applying this file:
# - Set the "FROM_NUMBER" value in the "vars" section

version: v1

project:
  name: twilio_sample
  vars:
    - name: FROM_NUMBER
      value: "+12345556789" # Replace this with a Twilio phone number.
  connections:
    - name: my_slack
      integration: slack
    - name: my_twilio
      integration: twilio
  triggers:
    - name: slack_slash_command
      connection: my_slack
      event_type: slash_command
      call: program.star:on_slack_slash_command
