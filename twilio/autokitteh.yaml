# This YAML file is a declarative manifest that describes the setup
# of an autokitteh project that uses Twilio (https://www.twilio.com).
#
# Before applying this file:
# 1. Open a browser, and go to the autokitteh server's URL
# 2. Go to the integrations page, and choose Twilio and Slack
# 3. Create connections for them, and copy the resulting tokens
# 4. Paste them in the designated lines below
# 5. Set the `FROM_NUMBER` environment constant value

version: v1

projects:
  - name: twilio_sample
    paths:
      - program.star
    connections:
      - name: slack
        integration: slack
        token: "*** REPLACE WITH AUTOKITTEH CONNECTION TOKEN ***"
      - name: twilio
        integration: twilio
        token: "*** REPLACE WITH AUTOKITTEH CONNECTION TOKEN ***"
    envs:
      - name: prod
        vars:
          - name: FROM_NUMBER
            value: "+1 234 555 6789"
        mappings:
          - name: slack
            connection: twilio_sample/slack
            events:
              - type: app_mention
                entrypoint: program.star:on_slack_app_mention
              - type: slash_command
                entrypoint: program.star:on_slack_slash_command
          - name: twilio
            connection: twilio_sample/twilio
